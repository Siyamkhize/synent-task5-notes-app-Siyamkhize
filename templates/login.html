{% extends "base.html" %}
{% block content %}
<h1>Login</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="row">
    <input name="username" type="text" placeholder="Username">
    <input name="password" type="password" placeholder="Password">
  </div>
  <div style="margin-top:10px">
    <button type="submit">Login</button>
  </div>
</form>
<hr style="margin:16px 0">
<div class="row" style="gap:8px">
  <a href="{{ url_for('oauth.oauth_login', provider='google') }}"><button type="button">Sign in with Google</button></a>
  <a href="{{ url_for('oauth.oauth_login', provider='github') }}"><button type="button" class="secondary">Sign in with GitHub</button></a>
</div>
{% endblock %}
