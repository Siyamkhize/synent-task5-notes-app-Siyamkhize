<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Notes App' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f7f7f8; color: #111; }
    header { background: #111827; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    header a { color: #fff; text-decoration: none; margin-left: 12px; }
    .container { max-width: 900px; margin: 24px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.05); }
    h1, h2 { margin: 0 0 12px; }
    form .row { display: flex; gap: 12px; flex-wrap: wrap; }
    input[type=text], input[type=password], textarea { width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; }
    button { padding: 10px 14px; background: #2563eb; border: 0; color: #fff; border-radius: 8px; cursor: pointer; }
    button.secondary { background: #6b7280; }
    .error { color: #b91c1c; margin: 8px 0; }
    nav a { margin-left: 8px; }
    .note { border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin: 10px 0; }
    .note h3 { margin: 0 0 6px; }
    .actions { display: flex; gap: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .muted { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div><strong>Notes</strong></div>
    <nav>
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('notes.index') }}">Home</a>
      <a href="{{ url_for('notes.scrape_view') }}">Scrape</a>
      <a href="{{ url_for('auth.logout') }}">Logout</a>
      {% else %}
      <a href="{{ url_for('auth.login') }}">Login</a>
      <a href="{{ url_for('auth.register') }}">Register</a>
      {% endif %}
    </nav>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
